name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Unit Tests & API Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :dejavu:testDebugUnitTest :dejavu:jvmTest :dejavu:lintDebug apiCheck

  compose-compat:
    name: Compose BOM ${{ matrix.bom }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bom: ["2026.01.01", "2026.03.01", "2026.05.00"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :dejavu:compileDebugKotlin :dejavu:testDebugUnitTest -PcomposeBomVersion=${{ matrix.bom }}

  ios-tests:
    name: iOS Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - name: Xcode preflight
        run: |
          if [ -d /Applications/Xcode_26.5.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          fi
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version
      - name: Compile all iOS targets
        # iosArm64 (device) is compile-only;
        # only iosSimulatorArm64 can run tests on the macOS runner (Apple Silicon).
        run: ./gradlew :dejavu:compileKotlinIosArm64 :dejavu:compileKotlinIosSimulatorArm64
      - name: Run iOS simulator tests
        run: ./gradlew :dejavu:iosSimulatorArm64Test :compose-experimental:iosSimulatorArm64Test

  wasm-tests:
    name: WasmJs Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :dejavu:wasmJsBrowserTest :compose-experimental:wasmJsBrowserTest

  compose-experimental:
    name: Compose Experimental Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :compose-experimental:jvmTest

  build-demos:
    name: Build Demo Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :demo-desktop:compileKotlinJvm :demo-wasm:compileKotlinWasmJs

  instrumented-tests:
    name: Instrumented Tests (BOM ${{ matrix.bom }}, API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        bom: ["2026.01.01", "2026.03.01", "2026.05.00"]
        api-level: [26, 31]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build APKs
        run: ./gradlew :demo:assembleDebug :demo:assembleDebugAndroidTest -PcomposeBomVersion=${{ matrix.bom }}

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          script: ./gradlew :demo:connectedDebugAndroidTest -PcomposeBomVersion=${{ matrix.bom }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-${{ matrix.bom }}-api${{ matrix.api-level }}
          path: demo/build/reports/androidTests/
          retention-days: 14

  compose-experimental-instrumented:
    name: Compose Experimental Instrumented Tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 31]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build regression APKs
        run: ./gradlew :compose-experimental:assembleDebug :compose-experimental:assembleDebugAndroidTest

      - name: Run regression instrumented tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          script: ./gradlew :compose-experimental:connectedDebugAndroidTest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-experimental-instrumented-reports-api${{ matrix.api-level }}
          path: compose-experimental/build/reports/androidTests/
          retention-days: 14
