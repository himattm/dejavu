name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

jobs:
  check:
    name: Lint, Unit Tests & API Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :dejavu:testDebugUnitTest :dejavu:lintDebug apiCheck

  compose-compat:
    name: Compose BOM ${{ matrix.bom }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bom: ["2024.06.00", "2024.09.00", "2025.01.01", "2026.01.01"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :dejavu:compileDebugKotlin :dejavu:testDebugUnitTest -PcomposeBomVersion=${{ matrix.bom }}

  instrumented-tests:
    name: Instrumented Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build APKs
        run: ./gradlew :demo:assembleDebug :demo:assembleDebugAndroidTest

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: google_apis
          script: ./gradlew :demo:connectedDebugAndroidTest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-reports
          path: demo/build/reports/androidTests/
          retention-days: 14

  integration-tests:
    name: Jetchat Integration Tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Dejavu
        uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish Dejavu to mavenLocal
        run: ./gradlew :dejavu:publishToMavenLocal

      - name: Checkout Jetchat (sparse)
        uses: actions/checkout@v4
        with:
          repository: android/compose-samples
          ref: c962c366ac328bf4e810a9bf4e3ccee5a5d2ac73
          path: compose-samples
          sparse-checkout: Jetchat

      - name: Patch Jetchat for Dejavu
        run: ./integration-tests/jetchat/patch-jetchat.sh compose-samples/Jetchat

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build Jetchat test APKs
        working-directory: compose-samples/Jetchat
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest

      - name: Run Dejavu integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: google_apis
          working-directory: compose-samples/Jetchat
          script: ./gradlew :app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.example.compose.jetchat.ConversationRecompositionTest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jetchat-integration-test-reports
          path: compose-samples/Jetchat/app/build/reports/androidTests/
          retention-days: 14
