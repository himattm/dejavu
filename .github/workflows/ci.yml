name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

jobs:
  check:
    name: Lint, Unit Tests & API Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :dejavu:testDebugUnitTest :dejavu:jvmTest :dejavu:lintDebug apiCheck

  compose-compat:
    name: Compose BOM ${{ matrix.bom }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - bom: "2024.06.00"
            excludeObserver: "true"
          - bom: "2024.09.00"
            excludeObserver: "true"
          - bom: "2025.01.01"
            excludeObserver: "true"
          - bom: "2026.01.01"
            excludeObserver: "false"
          - bom: "2026.03.00"
            excludeObserver: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :dejavu:compileDebugKotlin :dejavu:testDebugUnitTest -PcomposeBomVersion=${{ matrix.bom }} -PexcludeCompositionObserver=${{ matrix.excludeObserver }}

  ios-tests:
    name: iOS Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile all iOS targets
        # iosArm64 (device) and iosX64 (Intel simulator) are compile-only checks;
        # only iosSimulatorArm64 can run tests on macos-latest (Apple Silicon).
        run: ./gradlew :dejavu:compileKotlinIosArm64 :dejavu:compileKotlinIosSimulatorArm64 :dejavu:compileKotlinIosX64
      - name: Run iOS simulator tests
        run: ./gradlew :dejavu:iosSimulatorArm64Test

  wasm-tests:
    name: WasmJs Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :dejavu:wasmJsBrowserTest

  instrumented-tests:
    name: Instrumented Tests (BOM ${{ matrix.bom }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - bom: "2024.06.00"
            excludeObserver: "true"
          - bom: "2024.09.00"
            excludeObserver: "true"
          - bom: "2025.01.01"
            excludeObserver: "true"
          - bom: "2026.01.01"
            excludeObserver: "false"
          - bom: "2026.03.00"
            excludeObserver: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build APKs
        run: ./gradlew :demo:assembleDebug :demo:assembleDebugAndroidTest -PcomposeBomVersion=${{ matrix.bom }} -PexcludeCompositionObserver=${{ matrix.excludeObserver }}

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: google_apis
          script: ./gradlew :demo:connectedDebugAndroidTest -PcomposeBomVersion=${{ matrix.bom }} -PexcludeCompositionObserver=${{ matrix.excludeObserver }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-${{ matrix.bom }}
          path: demo/build/reports/androidTests/
          retention-days: 14
