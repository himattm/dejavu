name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  resolve-bom:
    name: Resolve Latest Compose BOM
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.latest.outputs.version }}
    steps:
      - name: Get latest BOM from Google Maven
        id: latest
        run: |
          LATEST=$(curl -sf https://dl.google.com/dl/android/maven2/androidx/compose/compose-bom/maven-metadata.xml \
            | grep '<release>' \
            | sed 's/.*<release>\(.*\)<\/release>/\1/')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest stable BOM: $LATEST"

  verify-latest-bom:
    name: Verify against Compose BOM ${{ needs.resolve-bom.outputs.version }}
    needs: resolve-bom
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile with latest BOM
        run: ./gradlew :dejavu:compileDebugKotlin -PcomposeBomVersion=${{ needs.resolve-bom.outputs.version }}

      - name: Run unit tests with latest BOM
        run: ./gradlew :dejavu:testDebugUnitTest -PcomposeBomVersion=${{ needs.resolve-bom.outputs.version }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build test APKs with latest BOM
        run: ./gradlew :demo:assembleDebug :demo:assembleDebugAndroidTest -PcomposeBomVersion=${{ needs.resolve-bom.outputs.version }}

      - name: Run instrumented tests with latest BOM
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 31
          arch: x86_64
          target: google_apis
          script: ./gradlew :demo:connectedDebugAndroidTest -PcomposeBomVersion=${{ needs.resolve-bom.outputs.version }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-bom-verification-reports
          path: demo/build/reports/androidTests/
          retention-days: 14

  verify-kmp-targets:
    name: Verify KMP Targets
    needs: resolve-bom
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run JVM Desktop tests
        run: ./gradlew :dejavu:jvmTest

      - name: Compile iOS targets
        run: ./gradlew :dejavu:compileKotlinIosArm64 :dejavu:compileKotlinIosSimulatorArm64 :dejavu:compileKotlinIosX64

      - name: Run WasmJs tests
        run: ./gradlew :dejavu:wasmJsBrowserTest

  publish:
    name: Publish
    needs: [verify-latest-bom, verify-kmp-targets]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central
        run: ./gradlew :dejavu:publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
