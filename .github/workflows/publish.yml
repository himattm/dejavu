name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  resolve-bom:
    name: Resolve Release Compose BOM
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get release BOM from version catalog
        id: release
        run: |
          RELEASE=$(grep '^composeBom' gradle/libs.versions.toml \
            | sed 's/composeBom = "\(.*\)"/\1/')
          echo "version=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Release BOM: $RELEASE"

  verify-release-bom:
    name: Verify against Compose BOM ${{ needs.resolve-bom.outputs.version }}
    needs: resolve-bom
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Compile with release BOM
        run: ./gradlew :dejavu:compileDebugKotlin -PcomposeBomVersion=${{ needs.resolve-bom.outputs.version }}

      - name: Run unit tests with release BOM
        run: ./gradlew :dejavu:testDebugUnitTest -PcomposeBomVersion=${{ needs.resolve-bom.outputs.version }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build test APKs with release BOM
        run: ./gradlew :demo:assembleDebug :demo:assembleDebugAndroidTest :compose-experimental:assembleDebug :compose-experimental:assembleDebugAndroidTest -PcomposeBomVersion=${{ needs.resolve-bom.outputs.version }}

      - name: Run instrumented tests with release BOM
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 31
          arch: x86_64
          target: google_apis
          script: ./gradlew :demo:connectedDebugAndroidTest :compose-experimental:connectedDebugAndroidTest -PcomposeBomVersion=${{ needs.resolve-bom.outputs.version }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-bom-verification-reports
          path: |
            demo/build/reports/androidTests/
            compose111-regression/build/reports/androidTests/
          retention-days: 14

  verify-kmp-targets:
    name: Verify KMP Targets
    needs: resolve-bom
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6
      - name: Xcode preflight
        run: |
          if [ -d /Applications/Xcode_26.5.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          fi
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version

      - name: Run JVM Desktop tests
        run: ./gradlew :dejavu:jvmTest :compose-experimental:jvmTest

      - name: Compile iOS targets
        run: ./gradlew :dejavu:compileKotlinIosArm64 :dejavu:compileKotlinIosSimulatorArm64

      - name: Run iOS simulator regression tests
        run: ./gradlew :dejavu:iosSimulatorArm64Test :compose-experimental:iosSimulatorArm64Test

      - name: Run WasmJs tests
        run: ./gradlew :dejavu:wasmJsBrowserTest :compose-experimental:wasmJsBrowserTest

  publish:
    name: Publish
    needs: [verify-release-bom, verify-kmp-targets]
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Publish to Maven Central
        run: ./gradlew :dejavu:publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
