name: Compose BOM Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9am UTC
  workflow_dispatch:

jobs:
  check-bom:
    name: Check for New Compose BOM
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.latest.outputs.version }}
      current: ${{ steps.current.outputs.version }}
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Get latest BOM from Google Maven
        id: latest
        run: |
          LATEST=$(curl -sf https://dl.google.com/dl/android/maven2/androidx/compose/compose-bom/maven-metadata.xml \
            | grep '<release>' \
            | sed 's/.*<release>\(.*\)<\/release>/\1/')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest stable BOM: $LATEST"

      - name: Get current BOM from version catalog
        id: current
        run: |
          CURRENT=$(grep '^composeBom' gradle/libs.versions.toml \
            | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current BOM: $CURRENT"

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.latest.outputs.version }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New BOM available: ${{ steps.latest.outputs.version }}"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "BOM is up to date"
          fi

  test-new-bom:
    name: Test with BOM ${{ needs.check-bom.outputs.latest }}
    needs: check-bom
    if: needs.check-bom.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v5

      - name: Compile with new BOM
        run: ./gradlew :dejavu:compileDebugKotlin -PcomposeBomVersion=${{ needs.check-bom.outputs.latest }}

      - name: Run JVM unit tests with new BOM
        run: ./gradlew :dejavu:testDebugUnitTest -PcomposeBomVersion=${{ needs.check-bom.outputs.latest }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build test APKs with new BOM
        run: ./gradlew :demo:assembleDebug :demo:assembleDebugAndroidTest -PcomposeBomVersion=${{ needs.check-bom.outputs.latest }}

      - name: Run instrumented tests with new BOM
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: google_apis
          script: ./gradlew :demo:connectedDebugAndroidTest -PcomposeBomVersion=${{ needs.check-bom.outputs.latest }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bom-${{ needs.check-bom.outputs.latest }}-test-reports
          path: demo/build/reports/androidTests/
          retention-days: 14

  open-issue:
    name: Open Issue
    needs: [check-bom, test-new-bom]
    if: always() && needs.check-bom.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Determine test result
        id: result
        run: |
          if [ "${{ needs.test-new-bom.result }}" = "success" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "emoji=:white_check_mark:" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "emoji=:x:" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or skip issue
        uses: actions/github-script@v7
        with:
          script: |
            const latest = '${{ needs.check-bom.outputs.latest }}';
            const current = '${{ needs.check-bom.outputs.current }}';
            const status = '${{ steps.result.outputs.status }}';
            const emoji = status === 'passed' ? '\u2705' : '\u274c';
            const title = `Compose BOM ${latest} available (current: ${current})`;

            // Skip if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'compose-bom-update'
            });
            if (issues.data.some(i => i.title.includes(latest))) {
              console.log('Issue already exists, skipping');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: [
                `A new Compose BOM version has been detected.`,
                ``,
                `| | Version |`,
                `|---|---|`,
                `| **Current** | \`${current}\` |`,
                `| **Latest** | \`${latest}\` |`,
                ``,
                `### Test Results`,
                ``,
                `${emoji} Full instrumented test suite **${status}** against BOM \`${latest}\`.`,
                ``,
                status === 'passed'
                  ? `The new BOM is compatible. Update \`composeBom\` in \`gradle/libs.versions.toml\` and add \`${latest}\` to the \`compose-compat\` CI matrix.`
                  : `The new BOM has failures. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
                ``,
                `### Links`,
                `- [Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                `- [Release notes](https://developer.android.com/jetpack/androidx/releases/compose)`,
                `- [BOM version mapping](https://developer.android.com/develop/ui/compose/bom/bom-mapping)`,
              ].join('\n'),
              labels: ['compose-bom-update']
            });
