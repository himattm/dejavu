site_name: Dejavu
site_description: Lock in Compose performance. Catch recomposition regressions before your users.
site_url: https://dejavu.mmckenna.me
repo_url: https://github.com/himattm/dejavu
repo_name: himattm/dejavu
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    logo: simple/ebox
  favicon: assets/favicon.svg
  font:
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Use Cases: use-cases.md
  - Examples: examples.md
  - API Reference: api-reference.md
  - How It Works: how-it-works.md
  - Error Messages: error-messages.md
  - Causality Analysis: causality-analysis.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/himattm/dejavu
